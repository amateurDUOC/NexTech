# ============================================================
# NexTech WordPress Project - SonarQube Configuration
# ============================================================
sonar.projectKey=NexTech-WordPress-Project
sonar.projectName=NexTech WordPress Project
sonar.projectVersion=1.0.0

# Solo analizar el código personalizado (tema hijo + plugins propios)
sonar.sources=wp-content/themes/wordpressstester,wp-content/plugins/pc-gamer-configurator,wp-content/plugins/sweetalert-checkout-confirmation,wp-content/plugins/Linkify-Woocommerce,wp-content/plugins/voya-chile-lugares-y-cotizador-de-despachos

# Exclusiones dentro del código personalizado
sonar.exclusions=**/node_modules/**,**/vendor/**,**/.git/**,**/*.min.js,**/*.min.css,**/screenshot.png,**/error_log,**/*.zip,**/__MACOSX/**

# Lenguaje principal
sonar.language=php

# Encoding
sonar.sourceEncoding=UTF-8

# Deshabilitar SCM (proyecto sin Git)
sonar.scm.disabled=true

# Servidor SonarQube (Docker local)
sonar.host.url=http://localhost:9000

# PHP - versión compatible con WordPress 6.x
sonar.php.version=7.4

# Cobertura de tests (cuando se agreguen)
# sonar.php.coverage.reportPaths=coverage.xml
